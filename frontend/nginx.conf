map $http_user_agent $is_social_bot {
    default                                 0;
    ~*facebookexternalhit                   1;
    ~*Facebot                               1;
    ~*Twitterbot                            1;
    ~*WhatsApp                              1;
    ~*LinkedInBot                           1;
    ~*Slackbot                              1;
    ~*TelegramBot                           1;
    ~*Discordbot                            1;
    ~*Pinterest                             1;
    ~*W3C_Validator                         1;
}

server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    resolver 127.0.0.11 valid=10s ipv6=off;

    # Blog article pages: serve OG preview to bots, React SPA to humans
    location ~ ^/blog/([^/]+)$ {
        set $slug $1;
        if ($is_social_bot) {
            rewrite ^/blog/(.+)$ /api/share/blog/$1 break;
            proxy_pass http://backend:8001;
        }
        try_files $uri /index.html;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }

    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
