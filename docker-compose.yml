services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: audy_cook
      POSTGRES_USER: audycook
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-audycook_pass}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U audycook -d audy_cook"]
      interval: 5s
      timeout: 5s
      retries: 10
    ports:
      - "5432:5432"

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://audycook:${POSTGRES_PASSWORD:-audycook_pass}@postgres:5432/audy_cook
      PORT: 8001
      CORS_ORIGINS: http://localhost:3000
      JWT_SECRET: ${JWT_SECRET:-audycook_jwt_secret}
      ADMIN_EMAIL: ${ADMIN_EMAIL:-admin@audycook.com}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-audycook2026}
      STRIPE_API_KEY: ${STRIPE_API_KEY:-}
      RESEND_API_KEY: ${RESEND_API_KEY:-}
      FRONTEND_URL: ${FRONTEND_URL:-https://audy-cook.pages.dev}
      BACKEND_PUBLIC_URL: ${BACKEND_PUBLIC_URL:-https://audy-cook-backend.onrender.com}
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "8001:8001"
    volumes:
      - uploads_data:/app/uploads

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        REACT_APP_BACKEND_URL: ${REACT_APP_BACKEND_URL:-http://localhost:8001}
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      - backend

volumes:
  postgres_data:
  uploads_data:
