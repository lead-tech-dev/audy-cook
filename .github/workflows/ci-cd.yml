name: CI/CD

on:
  pull_request:
  push:
    branches:
      - main

concurrency:
  group: ci-cd-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend-integration:
    name: Backend integration tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Start backend stack
        run: docker compose up --build -d postgres backend

      - name: Wait for API healthcheck
        run: |
          for i in {1..60}; do
            if curl -fsS http://localhost:8001/api/health > /dev/null; then
              exit 0
            fi
            sleep 5
          done
          docker compose logs backend
          exit 1

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Python test dependencies
        run: python -m pip install --upgrade pip pytest requests

      - name: Run backend regression tests
        env:
          REACT_APP_BACKEND_URL: http://localhost:8001
        run: pytest backend/tests -q

      - name: Stop backend stack
        if: always()
        run: docker compose down -v

  frontend-build:
    name: Frontend build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci --legacy-peer-deps

      - name: Build frontend
        working-directory: frontend
        env:
          REACT_APP_BACKEND_URL: http://localhost:8001
        run: npm run build

  deploy-backend:
    name: Deploy backend to Render
    runs-on: ubuntu-latest
    needs:
      - backend-integration
      - frontend-build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main' && secrets.RENDER_DEPLOY_HOOK_URL != ''

    steps:
      - name: Trigger Render deploy hook
        run: curl -fsS -X POST "$RENDER_DEPLOY_HOOK_URL"
        env:
          RENDER_DEPLOY_HOOK_URL: ${{ secrets.RENDER_DEPLOY_HOOK_URL }}

  deploy-frontend:
    name: Deploy frontend to Cloudflare Pages
    runs-on: ubuntu-latest
    needs:
      - backend-integration
      - frontend-build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main' && secrets.CLOUDFLARE_API_TOKEN != '' && secrets.CLOUDFLARE_ACCOUNT_ID != '' && secrets.CLOUDFLARE_PAGES_PROJECT_NAME != '' && secrets.PUBLIC_BACKEND_URL != ''

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci --legacy-peer-deps

      - name: Build frontend for production
        working-directory: frontend
        env:
          REACT_APP_BACKEND_URL: ${{ secrets.PUBLIC_BACKEND_URL }}
        run: npm run build

      - name: Deploy to Cloudflare Pages
        working-directory: frontend
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_PAGES_PROJECT_NAME: ${{ secrets.CLOUDFLARE_PAGES_PROJECT_NAME }}
        run: npx wrangler@4 pages deploy ./build --project-name "$CLOUDFLARE_PAGES_PROJECT_NAME"
